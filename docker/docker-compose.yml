version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: postgres-db
    environment:
      POSTGRES_DB: mobility_dw
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - ../sql/create_databases.sql:/docker-entrypoint-initdb.d/0-create_databases.sql
      - ../sql/init_oltp.sql:/docker-entrypoint-initdb.d/1-init_oltp.sql
      - ../sql/init_dw.sql:/docker-entrypoint-initdb.d/2-init_dw.sql
      - ../sql/powerbi_views.sql:/docker-entrypoint-initdb.d/3-powerbi_views.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d mobility_dw"]
      interval: 5s
      timeout: 5s
      retries: 5

  zookeeper:
    image: confluentinc/cp-zookeeper:7.3.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  kafka:
    image: confluentinc/cp-kafka:7.3.0
    container_name: kafka
    ports:
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    depends_on:
      - zookeeper

  kafka-setup:
    image: confluentinc/cp-kafka:7.3.0
    container_name: kafka-setup
    depends_on:
      - kafka
    entrypoint: [ "sh", "-c", "kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic traffic-sensors-topic --partitions 1 --replication-factor 1 && kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic gps-tracking-topic --partitions 1 --replication-factor 1 && kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic dead-letter-topic --partitions 1 --replication-factor 1" ]

  fastapi-app:
    build:
      context: ..
      dockerfile: docker/fastapi.Dockerfile
    container_name: fastapi-app
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  spark-master:
    build:
      context: ..
      dockerfile: docker/spark.Dockerfile
    container_name: spark-master
    command: bin/spark-class org.apache.spark.deploy.master.Master
    ports:
      - "8090:8080"
      - "7077:7077"
    volumes:
      - ../spark/jobs:/opt/spark-apps

  spark-worker:
    build:
      context: ..
      dockerfile: docker/spark.Dockerfile
    container_name: spark-worker
    command: bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077
    depends_on:
      - spark-master
    environment:
      SPARK_WORKER_CORES: 1
      SPARK_WORKER_MEMORY: 1g
    volumes:
      - ../spark/jobs:/opt/spark-apps

  spark-stream-job:
    build:
      context: ..
      dockerfile: docker/spark.Dockerfile
    container_name: spark-stream-job
    volumes:
      - ../spark/jobs:/opt/spark-apps
    command: spark-submit --packages org.apache.spark:spark-sql-kafka-0-10_2.12:3.4.1,org.postgresql:postgresql:42.6.0 /opt/spark-apps/stream_traffic_metrics.py
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/mobility_dw
      DB_USER: postgres
      DB_PASSWORD: postgres
    depends_on:
      postgres:
        condition: service_healthy
      kafka-setup:
        condition: service_completed_successfully

  traffic-producer:
    image: python:3.10-slim
    container_name: traffic-producer
    volumes:
      - ../kafka:/app
    working_dir: /app
    command: sh -c "pip install -r requirements.txt && python producers/traffic_producer.py"
    depends_on:
      kafka-setup:
        condition: service_completed_successfully

  dlq-logger:
    image: python:3.10-slim
    container_name: dlq-logger
    volumes:
      - ../kafka:/app
    working_dir: /app
    command: sh -c "pip install -r requirements.txt && python consumers/dlq_logger.py"
    depends_on:
      kafka-setup:
        condition: service_completed_successfully

  airflow-webserver:
    build:
      context: ..
      dockerfile: docker/airflow.Dockerfile
    container_name: airflow-webserver
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - LOAD_EXEMPLARS=False
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://postgres:postgres@postgres:5432/airflow
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
    logging:
      options:
        max-size: "10m"
        max-file: "3"
    volumes:
      - ../airflow/dags:/opt/airflow/dags
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "8085:8080"
    command: db init && airflow users create --username admin --firstname admin --lastname admin --role Admin --email admin@example.com --password admin && airflow webserver

  airflow-scheduler:
    build:
      context: ..
      dockerfile: docker/airflow.Dockerfile
    container_name: airflow-scheduler
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://postgres:postgres@postgres:5432/airflow
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
    volumes:
      - ../airflow/dags:/opt/airflow/dags
      - /var/run/docker.sock:/var/run/docker.sock
    command: scheduler
